<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>

  <!-- Coin symbol -->
  <circle cx="70" cy="75" r="28" fill="url(#grad1)" stroke="white" stroke-width="2"/>
  <text x="70" y="85" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">€</text>

  <!-- Chart/Growth lines -->
  <g stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" fill="none">
    <polyline points="110,110 125,95 140,105 155,80"/>
  </g>

  <!-- Accent dots -->
  <circle cx="125" cy="95" r="3" fill="url(#grad1)"/>
  <circle cx="155" cy="80" r="3" fill="url(#grad1)"/>

  <!-- Small decorative elements -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.3"/>

  <!-- Text -->
  <text x="100" y="165" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle" font-family="Arial" letter-spacing="0.5">LEPETITFINANCIER</text>
</svg>