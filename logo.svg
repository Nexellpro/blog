<svg viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Playfair+Display:ital@0;1&display=swap');
    </style>
  </defs>

  <!-- "Le Petit" in script/cursive style -->
  <text x="250" y="90" font-family="Playfair Display, serif" font-size="72" font-style="italic" font-weight="400" fill="#2563eb" text-anchor="middle" letter-spacing="3">Le Petit</text>

  <!-- "Financier" in serif bold -->
  <text x="250" y="170" font-family="Playfair Display, serif" font-size="90" font-weight="700" fill="#0f172a" text-anchor="middle" letter-spacing="2">Financier</text>

  <!-- Decorative curved line underneath -->
  <path d="M 120 195 Q 250 210 380 195" stroke="#2563eb" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>