<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- "Le Petit" in elegant italic serif -->
  <text x="200" y="70" font-size="48" font-style="italic" font-family="Georgia, serif" font-weight="400" fill="url(#textGrad)" text-anchor="middle" letter-spacing="2">Le Petit</text>

  <!-- "Financier" in bold serif -->
  <text x="200" y="130" font-size="56" font-family="Georgia, serif" font-weight="700" fill="#0f172a" text-anchor="middle" letter-spacing="1.5">Financier</text>

  <!-- Decorative underline -->
  <line x1="80" y1="145" x2="320" y2="145" stroke="url(#textGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Subtle decorative dots -->
  <circle cx="70" cy="145" r="2.5" fill="url(#textGrad)"/>
  <circle cx="330" cy="145" r="2.5" fill="url(#textGrad)"/>
</svg>